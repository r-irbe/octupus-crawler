# CI Pipeline — Unified PR validation pipeline
# Implements: REQ-CICD-002 (PR trigger), REQ-CICD-004 (paths-filter),
#             REQ-CICD-005 (frozen-lockfile), REQ-CICD-006 (remote cache),
#             REQ-CICD-007 (guard function chain), REQ-CICD-009 (agent branch filtering),
#             REQ-CICD-022 (architecture conformance), REQ-CICD-023 (ADR compliance)
# Supersedes: agent-pr-validation.yml (unique jobs merged here)
# Integrates: quality-gate.yml coverage + artifact upload
# Design: docs/specs/ci-cd-pipeline/design.md
# ADR: docs/adr/ADR-012-ci-cd-pipeline.md

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

# T-CICD-004: Turborepo remote cache for CI (REQ-CICD-006)
env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # T-CICD-002: Detect changed packages (REQ-CICD-004)
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      packages: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-router:
              - 'packages/api-router/**'
            application-lifecycle:
              - 'packages/application-lifecycle/**'
            completion-detection:
              - 'packages/completion-detection/**'
            config:
              - 'packages/config/**'
            core:
              - 'packages/core/**'
            crawl-pipeline:
              - 'packages/crawl-pipeline/**'
            database:
              - 'packages/database/**'
            http-fetching:
              - 'packages/http-fetching/**'
            job-queue:
              - 'packages/job-queue/**'
            observability:
              - 'packages/observability/**'
            redis:
              - 'packages/redis/**'
            resilience:
              - 'packages/resilience/**'
            ssrf-guard:
              - 'packages/ssrf-guard/**'
            testing:
              - 'packages/testing/**'
            url-frontier:
              - 'packages/url-frontier/**'
            validation:
              - 'packages/validation/**'
            virtual-memory:
              - 'packages/virtual-memory/**'
            worker-management:
              - 'packages/worker-management/**'

  # T-CICD-003: Guard function chain (REQ-CICD-005, REQ-CICD-007)
  # Sequential: typecheck → lint → test (fail-fast per ADR-018)
  guard-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm turbo typecheck
      - name: Lint
        run: pnpm turbo lint
      - name: Test
        run: pnpm turbo test
      # N-001 fix: Upload JUnit artifacts from same runner that ran tests
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/test-results/junit.xml"
          retention-days: 30

  # T-CICD-005: Matrix test for affected packages only (REQ-CICD-004)
  # Provides per-package status checks in PR — Turborepo cache makes re-run fast
  test-affected:
    needs: [changes, guard-functions]
    if: needs.changes.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Test ${{ matrix.package }}
        run: pnpm turbo test --filter=@ipf/${{ matrix.package }}

  # T-CICD-021: Architecture conformance checks (REQ-CICD-022)
  # Barrel imports, file size limits, dependency direction
  architecture-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Architecture conformance
        run: bash scripts/check-architecture-conformance.sh

  # T-CICD-022: ADR compliance scan — advisory, non-blocking (REQ-CICD-023)
  adr-compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ADR compliance (advisory)
        run: bash scripts/check-adr-compliance.sh

  # --- Jobs from agent-pr-validation.yml (REQ-CICD-009) ---
  # Run on agent branches only: work/*, copilot/*, agent/*

  spec-drift-detection:
    needs: guard-functions
    if: >-
      startsWith(github.head_ref, 'work/') ||
      startsWith(github.head_ref, 'copilot/') ||
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for stale specs
        run: |
          for design in $(find docs/specs/ -name "design.md" 2>/dev/null); do
            SPEC_DIR=$(dirname "$design")
            TASKS_FILE="$SPEC_DIR/tasks.md"
            if [ -f "$TASKS_FILE" ]; then
              REMAINING=$(grep -c "^\- \[ \]" "$TASKS_FILE" 2>/dev/null || echo "0")
              TOTAL=$(grep -c "^\- \[" "$TASKS_FILE" 2>/dev/null || echo "0")
              if [ "$TOTAL" -gt 0 ]; then
                DONE=$((TOTAL - REMAINING))
                PCT=$((DONE * 100 / TOTAL))
                echo "$SPEC_DIR: $DONE/$TOTAL ($PCT%)"
              fi
            fi
          done

  context-file-lint:
    if: >-
      startsWith(github.head_ref, 'work/') ||
      startsWith(github.head_ref, 'copilot/') ||
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate context file sizes
        run: |
          FAILED=0
          for file_limit in "CLAUDE.md:200" "AGENTS.md:1000" ".github/copilot-instructions.md:1000"; do
            FILE="${file_limit%%:*}"
            LIMIT="${file_limit##*:}"
            if [ -f "$FILE" ]; then
              LINES=$(wc -l < "$FILE")
              if [ "$LINES" -gt "$LIMIT" ]; then
                echo "::error::$FILE exceeds $LIMIT lines ($LINES)"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  property-test-coverage:
    needs: guard-functions
    if: >-
      startsWith(github.head_ref, 'work/') ||
      startsWith(github.head_ref, 'copilot/') ||
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check property test coverage of EARS shall clauses
        run: |
          TOTAL_SHALL=0
          COVERED_SHALL=0
          for req in $(find . -name "requirements.md" -not -path "*/node_modules/*"); do
            COUNT=$(grep -c "shall" "$req" 2>/dev/null || echo "0")
            TOTAL_SHALL=$((TOTAL_SHALL + COUNT))
          done
          for prop in $(find . -name "*.property.test.ts" -not -path "*/node_modules/*"); do
            COUNT=$(grep -c "Property for REQ-" "$prop" 2>/dev/null || echo "0")
            COVERED_SHALL=$((COVERED_SHALL + COUNT))
          done
          echo "EARS shall clauses: $TOTAL_SHALL"
          echo "Property tests: $COVERED_SHALL"
          if [ "$TOTAL_SHALL" -gt 0 ]; then
            COVERAGE=$((COVERED_SHALL * 100 / TOTAL_SHALL))
            echo "Property coverage: ${COVERAGE}%"
            if [ "$COVERAGE" -lt 85 ]; then
              echo "::warning::Property test coverage ${COVERAGE}% is below 85% target"
            fi
          fi

  # --- Jobs from quality-gate.yml ---

  # S-001 fix: Security scanning migrated from agent-pr-validation.yml
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"

  # R-001 fix: Integration tests migrated from quality-gate.yml
  integration-tests:
    needs: guard-functions
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Integration Tests
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          if pnpm turbo run test:integration --dry-run 2>/dev/null; then
            pnpm turbo test:integration
          else
            echo "::notice::No test:integration script found, skipping"
          fi

  alert-tests:
    needs: guard-functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install promtool
        run: |
          PROM_VERSION="2.50.0"
          curl -sL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" | tar xz
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
      - name: Validate Alert Rules
        run: |
          if [ -f "infra/prometheus/alert-rules.yml" ]; then
            promtool check rules infra/prometheus/alert-rules.yml
            promtool test rules infra/prometheus/alert-rules-fetch.test.yml infra/prometheus/alert-rules-ops.test.yml
          else
            echo "::notice::No alert rules found, skipping"
          fi
