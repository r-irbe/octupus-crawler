# CI Quality — Supplementary quality checks split from ci.yml (file size compliance)
# Agent branch checks (REQ-CICD-009), security scanning, integration tests,
# TypeSpec compile + Spectral lint (REQ-COMM-005/006/008), alert tests
# Design: docs/specs/ci-cd-pipeline/design.md
# ADR: docs/adr/ADR-012-ci-cd-pipeline.md

name: CI Quality

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-quality-${{ github.head_ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  # --- Agent branch checks (REQ-CICD-009) ---
  # Run on agent branches only: work/*, copilot/*, agent/*

  spec-drift-detection:
    if: >-
      startsWith(github.head_ref, 'work/') ||
      startsWith(github.head_ref, 'copilot/') ||
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for stale specs
        run: |
          for design in $(find docs/specs/ -name "design.md" 2>/dev/null); do
            SPEC_DIR=$(dirname "$design")
            TASKS_FILE="$SPEC_DIR/tasks.md"
            if [ -f "$TASKS_FILE" ]; then
              REMAINING=$(grep -c "^\- \[ \]" "$TASKS_FILE" 2>/dev/null || echo "0")
              TOTAL=$(grep -c "^\- \[" "$TASKS_FILE" 2>/dev/null || echo "0")
              if [ "$TOTAL" -gt 0 ]; then
                DONE=$((TOTAL - REMAINING))
                PCT=$((DONE * 100 / TOTAL))
                echo "$SPEC_DIR: $DONE/$TOTAL ($PCT%)"
              fi
            fi
          done

  context-file-lint:
    if: >-
      startsWith(github.head_ref, 'work/') ||
      startsWith(github.head_ref, 'copilot/') ||
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate context file sizes
        run: |
          FAILED=0
          for file_limit in "CLAUDE.md:200" "AGENTS.md:1000" ".github/copilot-instructions.md:1000"; do
            FILE="${file_limit%%:*}"
            LIMIT="${file_limit##*:}"
            if [ -f "$FILE" ]; then
              LINES=$(wc -l < "$FILE")
              if [ "$LINES" -gt "$LIMIT" ]; then
                echo "::error::$FILE exceeds $LIMIT lines ($LINES)"
                FAILED=1
              fi
            fi
          done
          exit $FAILED

  property-test-coverage:
    if: >-
      startsWith(github.head_ref, 'work/') ||
      startsWith(github.head_ref, 'copilot/') ||
      startsWith(github.head_ref, 'agent/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check property test coverage of EARS shall clauses
        run: |
          TOTAL_SHALL=0
          COVERED_SHALL=0
          for req in $(find . -name "requirements.md" -not -path "*/node_modules/*"); do
            COUNT=$(grep -c "shall" "$req" 2>/dev/null || echo "0")
            TOTAL_SHALL=$((TOTAL_SHALL + COUNT))
          done
          for prop in $(find . -name "*.property.test.ts" -not -path "*/node_modules/*"); do
            COUNT=$(grep -c "Property for REQ-" "$prop" 2>/dev/null || echo "0")
            COVERED_SHALL=$((COVERED_SHALL + COUNT))
          done
          echo "EARS shall clauses: $TOTAL_SHALL"
          echo "Property tests: $COVERED_SHALL"
          if [ "$TOTAL_SHALL" -gt 0 ]; then
            COVERAGE=$((COVERED_SHALL * 100 / TOTAL_SHALL))
            echo "Property coverage: ${COVERAGE}%"
            if [ "$COVERAGE" -lt 85 ]; then
              echo "::warning::Property test coverage ${COVERAGE}% is below 85% target"
            fi
          fi

  # --- Quality gate jobs ---

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.30.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "1"

  integration-tests:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Integration Tests
        env:
          REDIS_URL: redis://localhost:6379
        run: |
          if pnpm turbo run test:integration --dry-run 2>/dev/null; then
            pnpm turbo test:integration
          else
            echo "::notice::No test:integration script found, skipping"
          fi

  alert-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install promtool
        run: |
          PROM_VERSION="2.50.0"
          curl -sL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-amd64.tar.gz" | tar xz
          sudo mv "prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/
      - name: Validate Alert Rules
        run: |
          if [ -f "infra/prometheus/alert-rules.yml" ]; then
            promtool check rules infra/prometheus/alert-rules.yml
            promtool test rules infra/prometheus/alert-rules-fetch.test.yml infra/prometheus/alert-rules-ops.test.yml
          else
            echo "::notice::No alert rules found, skipping"
          fi

  # T-COMM-008: TypeSpec compile + Spectral lint (REQ-COMM-005, REQ-COMM-006, REQ-COMM-008)
  typespec-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Compile TypeSpec to OpenAPI
        run: pnpm typespec:compile
      - name: Spectral lint
        run: pnpm typespec:lint
      - name: Check for spec drift
        run: |
          if ! git diff --quiet specs/generated/; then
            echo "::error::Generated OpenAPI specs are out of date. Run 'pnpm typespec:compile' and commit."
            git diff specs/generated/
            exit 1
          fi
