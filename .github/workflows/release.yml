# Release Pipeline — Build, scan, and publish container images on merge to main
# Implements: REQ-CICD-013 (zero CVEs in images), REQ-CICD-014 (build on merge),
#             REQ-CICD-015 (BuildKit + GHA cache), REQ-CICD-016 (ghcr.io + SHA tags),
#             REQ-CICD-017 (multi-arch amd64 + arm64)
# Design: docs/specs/ci-cd-pipeline/design.md §Release Pipeline Design
# ADR: docs/adr/ADR-012-ci-cd-pipeline.md

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # T-CICD-016: Build matrix for all services (REQ-CICD-014)
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, worker-service, scheduler-service]
    steps:
      - uses: actions/checkout@v4

      # T-CICD-013: Docker BuildKit + buildx for multi-arch (REQ-CICD-015, REQ-CICD-017)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest

      # T-CICD-014: Build image (not pushed yet — scan first) (REQ-CICD-016)
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          load: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=oci,dest=/tmp/image-${{ matrix.service }}.tar

      # T-CICD-015: Trivy image scan before publish (REQ-CICD-013)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/image-${{ matrix.service }}.tar
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: table

      # Push only after Trivy passes
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
