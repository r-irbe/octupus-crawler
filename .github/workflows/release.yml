# Release Pipeline — Build, scan, and publish container images on merge to main
# Implements: REQ-CICD-013 (zero CVEs in images), REQ-CICD-014 (build on merge),
#             REQ-CICD-015 (BuildKit + GHA cache), REQ-CICD-016 (ghcr.io + SHA tags),
#             REQ-CICD-017 (multi-arch amd64 + arm64)
# Design: docs/specs/ci-cd-pipeline/design.md §Release Pipeline Design
# ADR: docs/adr/ADR-012-ci-cd-pipeline.md

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  # T-CICD-016: Build matrix for all services (REQ-CICD-014)
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        service: [api-gateway, worker-service, scheduler-service]
    steps:
      - uses: actions/checkout@v4

      # T-CICD-013: Docker BuildKit + buildx for multi-arch (REQ-CICD-015, REQ-CICD-017)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha
            type=raw,value=latest

      # T-CICD-014: Build image (not pushed yet — scan first) (REQ-CICD-016)
      - name: Build image for scan
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # T-CICD-015: Trivy image scan before publish (REQ-CICD-013)
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          severity: CRITICAL
          exit-code: "1"
          format: table

      # Push only after Trivy passes
      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # T-CICD-019: Update Kustomize overlays with new image tags (REQ-CICD-020)
  # ArgoCD watches these files and auto-syncs on change.
  # Safety: GITHUB_TOKEN does not trigger further workflow runs (GitHub docs),
  # so the bot commit below cannot cause an infinite release loop.
  update-kustomize:
    needs: [build-and-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Kustomize
        uses: imranismail/setup-kustomize@v2

      # SHA truncation (::7) matches docker/metadata-action type=sha (7-char prefix)
      - name: Update image tags for all services
        run: |
          SHORT_TAG="sha-${GITHUB_SHA::7}"
          cd infra/k8s/base
          kustomize edit set image \
            "ipf-api-gateway=${IMAGE_PREFIX}/api-gateway:${SHORT_TAG}" \
            "ipf-crawler=${IMAGE_PREFIX}/worker-service:${SHORT_TAG}" \
            "ipf-scheduler=${IMAGE_PREFIX}/scheduler-service:${SHORT_TAG}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infra/k8s/
          if git diff --staged --quiet; then
            echo "No Kustomize changes to commit"
          else
            git commit -m "chore(k8s): update image tags to sha-${GITHUB_SHA::7} [skip ci]" \
              -m "Full commit: ${GITHUB_SHA}"
            git pull --rebase origin main
            git push
          fi
