# IPF Crawler — Local Development Environment
# Implements: REQ-INFRA-017 (single-command startup)
#             REQ-INFRA-019 (crawler + Redis + Prometheus + Grafana)
#             REQ-INFRA-020 (Prometheus data persistence)
#             REQ-DATA-021 (local/cloud parity for PostgreSQL + MinIO)
# Usage: docker compose -f infra/docker/docker-compose.dev.yml up                 # Infrastructure only
#        docker compose -f infra/docker/docker-compose.dev.yml --profile demo up  # Full demo with crawler + simulator
# Design: docs/specs/infrastructure/design.md §5

services:
  # ── Crawler ────────────────────────────────────────
  crawler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      SERVICE_NAME: ipf-crawler
      NODE_ENV: development
      LOG_LEVEL: debug
      # REQ-INFRA-011, REQ-INFRA-018: State store connection
      REDIS_URL: redis://dragonfly:6379
      # REQ-DATA-021: PostgreSQL connection
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/ipf
      # REQ-DATA-021: S3-compatible object storage
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ipf-crawl-pages
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # Crawler settings
      SEED_URLS: "http://web-simulator:8080/"
      CRAWL_MAX_DEPTH: "3"
      CRAWL_MAX_CONCURRENT_FETCHES: "5"
      CRAWL_FETCH_TIMEOUT_MS: "10000"
      CRAWL_POLITENESS_DELAY_MS: "500"
      CRAWL_MAX_RETRIES: "3"
      # Observability
      METRICS_PORT: "9090"
      HEALTH_PORT: "8081"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
    ports:
      - "9090:9090"
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      dragonfly:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy
      web-simulator:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    profiles: ["demo"]

  # ── Web Simulator ──────────────────────────────────
  # Deterministic crawl target with 7 pages + robots.txt + test scenarios.
  # Generates real crawl traffic so Prometheus/Grafana dashboards populate.
  web-simulator:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web-simulator
    environment:
      SIMULATOR_PORT: "8080"
    ports:
      - "8080:8080"
      - "8082:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles: ["demo"]

  # ── PostgreSQL ─────────────────────────────────────
  # REQ-DATA-001: PostgreSQL for structured crawl metadata
  # REQ-DATA-021: Local/cloud parity — same schema, different config
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ipf
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible) ──────────────────────────
  # REQ-DATA-001: S3/MinIO for raw page content storage
  # REQ-DATA-022: Full S3 API compatibility for local dev
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── State Store (Dragonfly/Redis) ──────────────────
  # REQ-INFRA-009: Persistence via snapshot dump + volume
  # REQ-INFRA-010: Health check via redis-cli ping
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.27.1
    command: ["--dir", "/data", "--dbfilename", "dump", "--proactor_threads", "2", "--maxmemory", "512mb"]
    ports:
      - "6379:6379"
    volumes:
      - dragonfly-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Prometheus ─────────────────────────────────────
  # REQ-INFRA-012: Scrape crawler metrics
  # REQ-INFRA-014: Load alert rules from config
  # REQ-INFRA-020: Data persistence via named volume
  prometheus:
    image: prom/prometheus:v3.11.2
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

  # ── Jaeger (Tracing) ────────────────────────────────
  # Distributed tracing backend with built-in OTLP collector.
  # UI: http://localhost:16686 — search traces by service name, operation, tags
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:14269/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Loki (Log Aggregation) ───────────────────────────
  # REQ-LTO-008: Centralized log store for all crawler container logs
  # REQ-LTO-012: Docker Compose Loki stack
  loki:
    image: grafana/loki:3.6.10
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Promtail (Log Collector) ────────────────────────
  # Scrapes Docker container logs and ships to Loki
  promtail:
    image: grafana/promtail:3.6.10
    volumes:
      - ../monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: ["-config.file=/etc/promtail/config.yml"]
    depends_on:
      loki:
        condition: service_healthy

  # ── Grafana ────────────────────────────────────────
  # REQ-INFRA-013: Pre-configured dashboards
  grafana:
    image: grafana/grafana:11.6
    volumes:
      - ../monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - ../monitoring/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"   # DEV ONLY — disable in production
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer     # DEV ONLY — disable in production

volumes:
  dragonfly-data:
  postgresql-data:
  minio-data:
  prometheus-data:
