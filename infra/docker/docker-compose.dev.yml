# IPF Crawler — Local Development Environment
# Implements: REQ-INFRA-017 (single-command startup)
#             REQ-INFRA-019 (crawler + Redis + Prometheus + Grafana)
#             REQ-INFRA-020 (Prometheus data persistence)
#             REQ-DATA-021 (local/cloud parity for PostgreSQL + MinIO)
# Usage: docker compose -f infra/docker/docker-compose.dev.yml up
# Design: docs/specs/infrastructure/design.md §5

services:
  # ── Crawler ────────────────────────────────────────
  crawler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      SERVICE_NAME: ipf-crawler
      NODE_ENV: development
      LOG_LEVEL: debug
      # REQ-INFRA-011, REQ-INFRA-018: State store connection
      REDIS_URL: redis://dragonfly:6379
      # REQ-DATA-021: PostgreSQL connection
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/ipf
      # REQ-DATA-021: S3-compatible object storage
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ipf-crawl-pages
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # Crawler settings
      SEED_URLS: "https://example.com"
      CRAWL_MAX_DEPTH: "3"
      CRAWL_MAX_CONCURRENT_FETCHES: "5"
      CRAWL_FETCH_TIMEOUT_MS: "10000"
      CRAWL_POLITENESS_DELAY_MS: "1000"
      CRAWL_MAX_RETRIES: "3"
      # Observability
      METRICS_PORT: "9090"
      HEALTH_PORT: "8081"
    ports:
      - "9090:9090"
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      dragonfly:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── PostgreSQL ─────────────────────────────────────
  # REQ-DATA-001: PostgreSQL for structured crawl metadata
  # REQ-DATA-021: Local/cloud parity — same schema, different config
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ipf
    ports:
      - "5432:5432"
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible) ──────────────────────────
  # REQ-DATA-001: S3/MinIO for raw page content storage
  # REQ-DATA-022: Full S3 API compatibility for local dev
  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── State Store (Dragonfly/Redis) ──────────────────
  # REQ-INFRA-009: Persistence via snapshot dump + volume
  # REQ-INFRA-010: Health check via redis-cli ping
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.37.2
    command: ["--dir", "/data", "--dbfilename", "dump", "--proactor_threads", "2", "--maxmemory", "512mb"]
    ports:
      - "6379:6379"
    volumes:
      - dragonfly-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Prometheus ─────────────────────────────────────
  # REQ-INFRA-012: Scrape crawler metrics
  # REQ-INFRA-014: Load alert rules from config
  # REQ-INFRA-020: Data persistence via named volume
  prometheus:
    image: prom/prometheus:v2.50.0
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

  # ── Grafana ────────────────────────────────────────
  # REQ-INFRA-013: Pre-configured dashboards
  grafana:
    image: grafana/grafana:10.4.0
    volumes:
      - ../monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - ../monitoring/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"   # DEV ONLY — disable in production
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer     # DEV ONLY — disable in production

volumes:
  dragonfly-data:
  postgresql-data:
  minio-data:
  prometheus-data:
