# IPF Crawler — Local Development Environment
# Implements: REQ-INFRA-017 (single-command startup)
#             REQ-INFRA-019 (crawler + Redis + Prometheus + Grafana)
#             REQ-INFRA-020 (Prometheus data persistence)
# Usage: docker compose -f infra/docker/docker-compose.dev.yml up
# Design: docs/specs/infrastructure/design.md §5

services:
  # ── Crawler ────────────────────────────────────────
  crawler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    environment:
      SERVICE_NAME: ipf-crawler
      NODE_ENV: development
      LOG_LEVEL: debug
      # REQ-INFRA-011, REQ-INFRA-018: State store connection
      REDIS_URL: redis://dragonfly:6379
      # Stub values for required config fields
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ipf
      S3_ENDPOINT: http://localhost:9000
      S3_BUCKET: ipf-crawl-pages
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # Crawler settings
      SEED_URLS: "https://example.com"
      CRAWL_MAX_DEPTH: "3"
      CRAWL_MAX_CONCURRENT_FETCHES: "5"
      CRAWL_FETCH_TIMEOUT_MS: "10000"
      CRAWL_POLITENESS_DELAY_MS: "1000"
      CRAWL_MAX_RETRIES: "3"
      # Observability
      METRICS_PORT: "9090"
      HEALTH_PORT: "8081"
    ports:
      - "9090:9090"
      - "8081:8081"
    depends_on:
      dragonfly:
        condition: service_healthy

  # ── State Store (Dragonfly/Redis) ──────────────────
  # REQ-INFRA-009: Persistence via appendonly + volume
  # REQ-INFRA-010: Health check via redis-cli ping
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    command: ["--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - dragonfly-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Prometheus ─────────────────────────────────────
  # REQ-INFRA-012: Scrape crawler metrics
  # REQ-INFRA-014: Load alert rules from config
  # REQ-INFRA-020: Data persistence via named volume
  prometheus:
    image: prom/prometheus:v2.50
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9091:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"

  # ── Grafana ────────────────────────────────────────
  # REQ-INFRA-013: Pre-configured dashboards
  grafana:
    image: grafana/grafana:10
    volumes:
      - ../monitoring/dashboards:/var/lib/grafana/dashboards:ro
      - ../monitoring/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer

volumes:
  dragonfly-data:
  prometheus-data:
