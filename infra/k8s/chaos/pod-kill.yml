# Chaos Mesh: Random Pod Kill
# REQ-LTO-025: PodChaos experiment for crawler pods
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: crawler-pod-kill
  namespace: ipf
  labels:
    app.kubernetes.io/part-of: ipf-chaos-suite
    chaos-type: pod-kill
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - ipf
    labelSelectors:
      app: crawler-worker
  duration: "5m"
