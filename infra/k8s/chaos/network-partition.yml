# Chaos Mesh: Network Partition (worker ↔ Redis)
# REQ-LTO-026: NetworkChaos — partition isolation
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: crawler-redis-partition
  namespace: ipf
  labels:
    app.kubernetes.io/part-of: ipf-chaos-suite
    chaos-type: network-partition
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - ipf
    labelSelectors:
      app: crawler-worker
  direction: both
  target:
    selector:
      namespaces:
        - ipf
      labelSelectors:
        app: dragonfly
    mode: all
  duration: "3m"
