# Chaos Mesh: CPU Stress
# REQ-LTO-027: StressChaos — CPU pressure on crawler pods
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: crawler-cpu-stress
  namespace: ipf
  labels:
    app.kubernetes.io/part-of: ipf-chaos-suite
    chaos-type: cpu-stress
spec:
  mode: one
  selector:
    namespaces:
      - ipf
    labelSelectors:
      app: crawler-worker
  stressors:
    cpu:
      workers: 2
      load: 80
  duration: "5m"
