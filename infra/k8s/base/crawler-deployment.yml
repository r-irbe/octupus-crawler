# IPF Crawler — Worker Deployment
# Implements: REQ-INFRA-004 (multiple replicas)
#             REQ-INFRA-005 (liveness probe /health)
#             REQ-INFRA-006 (readiness probe /readyz)
#             REQ-INFRA-007 (restart policy Always)
#             REQ-INFRA-008 (resource limits)
# Design: docs/specs/infrastructure/design.md §2

apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler-worker
  namespace: ipf
  labels:
    app: crawler-worker
    app.kubernetes.io/part-of: ipf-crawler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crawler-worker
  template:
    metadata:
      labels:
        app: crawler-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      # REQ-INFRA-007: Restart on non-zero exit
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: crawler
          image: ipf-crawler:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: ipf-crawler
            - name: NODE_ENV
              value: production
            - name: METRICS_PORT
              value: "9090"
            - name: HEALTH_PORT
              value: "8081"
            # Secrets injected from K8s Secret (REQ-INFRA-016)
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: state-store-credentials
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: DATABASE_URL
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: S3_SECRET_KEY
          envFrom:
            - configMapRef:
                name: crawler-config
          # REQ-INFRA-005: Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          # REQ-INFRA-006: Readiness probe
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          # REQ-INFRA-008: Resource limits
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
