# Kustomize base configuration
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ipf

resources:
  - namespace.yml
  - crawler-deployment.yml
  - crawler-configmap.yml
  - secrets.yml
  - dragonfly-statefulset.yml
  - postgresql-statefulset.yml
  - minio-statefulset.yml

labels:
  - pairs:
      app.kubernetes.io/part-of: ipf-crawler
      app.kubernetes.io/managed-by: kustomize

# Image tags — updated by release pipeline (T-CICD-019, REQ-CICD-020)
# CI runs `kustomize edit set image` to set newName (registry) and newTag (SHA).
# Initial newTag: unreleased — first release pipeline run populates real values.
images:
  - name: ipf-api-gateway
    newTag: unreleased
  - name: ipf-crawler
    newTag: unreleased
  - name: ipf-scheduler
    newTag: unreleased
