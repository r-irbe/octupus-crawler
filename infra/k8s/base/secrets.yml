# IPF Crawler — Secrets (placeholder, actual values via External Secrets Operator)
# REQ-INFRA-016: Secrets via K8s Secrets, not plain ConfigMaps
# NOTE: In production, use External Secrets Operator to populate from vault.
#       These are placeholder values for local/dev only.

apiVersion: v1
kind: Secret
metadata:
  name: state-store-credentials
  namespace: ipf
  labels:
    app: crawler-worker
type: Opaque
stringData:
  REDIS_URL: "redis://dragonfly:6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: ipf
  labels:
    app: crawler-worker
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgresql:5432/ipf"
  POSTGRES_PASSWORD: "postgres"
---
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: ipf
  labels:
    app: crawler-worker
type: Opaque
stringData:
  S3_ACCESS_KEY: "minioadmin"
  S3_SECRET_KEY: "minioadmin"
