# Web Simulator Pod — deterministic crawl target for E2E tests
# Implements: REQ-K8E-016
# Deployed in ipf namespace alongside the crawler

apiVersion: v1
kind: Pod
metadata:
  name: web-simulator
  namespace: ipf
  labels:
    app: web-simulator
spec:
  containers:
    - name: simulator
      image: k3d-ipf-registry.localhost:5111/ipf-web-simulator:latest
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: scenarios
          containerPort: 8081
          protocol: TCP
      env:
        - name: SIMULATOR_PORT
          value: "8080"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      readinessProbe:
        httpGet:
          path: /
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: web-simulator
  namespace: ipf
spec:
  selector:
    app: web-simulator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: scenarios
      port: 8081
      targetPort: 8081
