# ArgoCD Application for IPF Crawler
# REQ-LTO-020: ArgoCD deployment in k3d
# REQ-LTO-022: ArgoCD sync during load tests
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ipf-crawler
  namespace: argocd
spec:
  project: default
  source:
    # For local dev, this points to the local git server or filesystem
    # In production, replace with your Git repository URL
    repoURL: https://github.com/example/ipf-crawler.git
    targetRevision: HEAD
    path: infra/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: ipf
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
